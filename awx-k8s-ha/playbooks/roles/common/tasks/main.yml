- name: Ensure required packages are installed
  package:
    name:
      - curl
      - wget
      - vim
      - git
      - bash-completion
      - tar
      - conntrack-tools
      - socat
      - iproute
      - ipset
      - jq
      - net-tools
      - nfs-utils
      - yum-utils
      - device-mapper-persistent-data
      - lvm2
      - keepalived
      - haproxy
      - ipvsadm
      - python3
      - python3-pip
      - ca-certificates
      - openssl
      - chrony
      - policycoreutils-python-utils
    state: present

- name: Enable chronyd
  service:
    name: chronyd
    state: started
    enabled: true

- name: Disable swap immediately
  command: swapoff -a
  when: disable_swap | bool
  changed_when: false

- name: Remove swap from fstab
  replace:
    path: /etc/fstab
    regexp: '^(.*\sswap\s+swap\s+.*)$'
    replace: '# \1'
  when: disable_swap | bool

- name: Load overlay module
  modprobe:
    name: overlay
    state: present

- name: Load br_netfilter module
  modprobe:
    name: br_netfilter
    state: present

- name: Persist kernel modules
  template:
    src: modules-load-k8s.conf.j2
    dest: /etc/modules-load.d/k8s.conf
    mode: '0644'

- name: Set sysctl params for kubernetes
  copy:
    dest: /etc/sysctl.d/99-kubernetes-cri.conf
    mode: '0644'
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
      net.ipv4.conf.all.rp_filter         = 0
      net.ipv4.conf.default.rp_filter     = 0
      net.ipv4.ip_nonlocal_bind           = 1

- name: Apply sysctl settings immediately (runtime)
  shell: |
    sysctl -w net.bridge.bridge-nf-call-iptables=1
    sysctl -w net.bridge.bridge-nf-call-ip6tables=1
    sysctl -w net.ipv4.ip_forward=1
    sysctl -w net.ipv4.conf.all.rp_filter=0
    sysctl -w net.ipv4.conf.default.rp_filter=0
    sysctl -w net.ipv4.ip_nonlocal_bind=1
  changed_when: false

- name: Reload sysctl from config files
  command: sysctl --system
  changed_when: false

- name: Disable firewalld
  service:
    name: firewalld
    state: stopped
    enabled: false
  when: disable_firewalld | bool
  ignore_errors: true

- name: Set SELinux permissive now
  command: setenforce 0
  when: set_selinux_permissive | bool
  failed_when: false
  changed_when: false

- name: Set SELinux permissive permanently
  replace:
    path: /etc/selinux/config
    regexp: '^SELINUX=.*'
    replace: 'SELINUX=permissive'
  when: set_selinux_permissive | bool

- name: Add Kubernetes repo
  copy:
    dest: /etc/yum.repos.d/kubernetes.repo
    mode: '0644'
    content: |
      [kubernetes]
      name=Kubernetes
      baseurl=https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version.split('.')[0] }}.{{ kubernetes_version.split('.')[1] }}/rpm/
      enabled=1
      gpgcheck=1
      gpgkey=https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version.split('.')[0] }}.{{ kubernetes_version.split('.')[1] }}/rpm/repodata/repomd.xml.key

- name: Install Kubernetes packages
  package:
    name:
      - kubelet-{{ kubernetes_version }}
      - kubeadm-{{ kubernetes_version }}
      - kubectl-{{ kubernetes_version }}
    state: present
    disable_excludes: all

- name: Enable kubelet
  service:
    name: kubelet
    state: started
    enabled: true

- name: Ensure hosts entries exist for all cluster nodes
  lineinfile:
    path: /etc/hosts
    line: "{{ hostvars[item].ansible_host }} {{ item }}"
    state: present
  loop: "{{ groups['k8s_cluster'] }}"
